poisson_surface_reconstruction:
  # Octree depth controlling mesh resolution; higher = finer detail but slower
  depth: 9
  # Scale factor applied to the bounding box before reconstruction; enlarging avoids boundary artifacts
  scale: 1.1
  # Whether to solve the linear system with a conjugate-gradient solver (True) or direct solver (False)
  linear_fit: false
  # Vertices below this quantile of the Poisson density array are removed (reduces floating geometry)
  density_threshold: 0.01
  # Keep only the largest connected component after Poisson reconstruction (removes background noise)
  keep_largest_component: true
  # Taubin smoothing applied after LCC — removes high-frequency wrinkles from MVS noise
  # Remove or set iterations: 0 to skip
  taubin_smoothing:
    iterations: 10
    lambda_filter: 0.5
    mu: -0.53

point_cloud_filtering:
  # neighbourhood size for mean distance computation
  nb_neighbors: 20
  # remove points whose mean neighbour distance exceeds mean + std_ratio * std_dev
  std_ratio: 2.0
