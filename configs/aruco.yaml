aruco:
  # Physical side length of the ArUco marker square (outer black border, the
  # edge enclosed by OpenCV-detected corners) in millimetres.
  # Source: ruler measurement of a marker taped to the AJCARE neonatal phantom,
  # 2026-07-15 (generator PDF renders 30.0 mm, but the print was scaled down —
  # the physical measurement wins).
  marker_length_mm: 20.0
  # OpenCV ArUco dictionary ID (0 = DICT_4X4_50, 1 = DICT_4X4_100, 2 = DICT_4X4_250)
  dict_id: 2
  # Minimum number of image views required to triangulate a marker corner
  min_views: 2
  # Independent scale sanity check: known physical center-to-center distances
  # between markers on the rigid cap, in millimetres. Measured with a ruler on
  # the actual cap. Empty list disables the check. Exceeding the tolerance
  # never aborts the run — it logs a prominent warning and is recorded in
  # pipeline_manifest.json -> scale_sanity_check for downstream gating.
  layout_check:
    known_distances_mm: []
    #  - ids: [0, 1]
    #    distance_mm: 80.0
    # Residual (percent of the expected distance) above which the check warns.
    warn_tolerance_pct: 5.0
